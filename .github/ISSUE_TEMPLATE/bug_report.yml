name: Bug Report
description: Report a defect in the system
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reliably trigger the issue.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or screenshots if relevant.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Domain Area
      description: Which part of the system is affected?
      options:
        - onboarding
        - offboarding
        - role-change
        - access
        - integrations
        - workflows
        - auth
        - api
        - db
        - config
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical — data loss or security issue
        - high — feature completely broken
        - medium — feature partially broken, workaround exists
        - low — minor issue or cosmetic
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Tenant ID (if known), logs, related issues, anything else relevant.
