<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StaffComplete</title>
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <meta name="theme-color" content="#041F1C" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        background: #041f1c;
        color: #fff;
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }

      /* ── Hero ── */
      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 24px 64px;
        gap: 52px;
      }

      /* ── Wordmark lockup ── */
      .lockup {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
      }

      .lockup-inner {
        display: flex;
        align-items: center;
        gap: clamp(18px, 4vw, 30px);
      }

      .wordmark {
        font-size: clamp(2.6rem, 8vw, 5rem);
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1;
      }

      .wordmark-staff {
        color: rgba(255, 255, 255, 0.85);
        font-weight: 300;
      }

      .wordmark-complete {
        color: #2dd4bf;
        font-weight: 700;
      }

      .tagline {
        font-size: clamp(0.6rem, 1.6vw, 0.75rem);
        font-weight: 600;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.3);
      }

      /* ── Divider ── */
      .divider {
        width: 1px;
        height: 48px;
        background: linear-gradient(to bottom, transparent, rgba(45, 212, 191, 0.35), transparent);
      }

      /* ── Coming soon card ── */
      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: clamp(36px, 6vw, 56px) clamp(32px, 6vw, 64px);
        max-width: 520px;
        width: 100%;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        backdrop-filter: blur(8px);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #2dd4bf;
        background: rgba(45, 212, 191, 0.1);
        border: 1px solid rgba(45, 212, 191, 0.2);
        border-radius: 999px;
        padding: 0.38em 1em;
      }

      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #2dd4bf;
        animation: pulse 2.4s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.75);
        }
      }

      .card-heading {
        font-size: clamp(1.3rem, 3.5vw, 1.65rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.2;
        color: #fff;
      }

      .card-body {
        font-size: 0.975rem;
        font-weight: 400;
        line-height: 1.7;
        color: #6b7280;
        max-width: 380px;
      }

      /* ── Footer ── */
      .footer {
        padding: 28px 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      .footer-text {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.15);
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <div class="lockup">
        <div class="lockup-inner">
          <!-- Thread mark — on dark -->
          <svg
            width="112"
            height="64"
            viewBox="0 0 140 80"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M 18,62 C 44,62 44,40 70,40 C 96,40 96,18 122,18"
              fill="none"
              stroke="white"
              stroke-width="4.5"
              stroke-linecap="round"
            />
            <circle cx="18" cy="62" r="11" fill="#041F1C" stroke="white" stroke-width="4.5" />
            <circle cx="70" cy="40" r="13.5" fill="white" />
            <circle cx="70" cy="40" r="5.5" fill="#041F1C" />
            <circle cx="122" cy="18" r="11" fill="#041F1C" stroke="white" stroke-width="4.5" />
          </svg>

          <div class="wordmark" aria-label="StaffComplete">
            <span class="wordmark-staff">Staff</span><span class="wordmark-complete">Complete</span>
          </div>
        </div>

        <p class="tagline">Full lifecycle, automated</p>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <div class="card">
        <span class="badge">
          <span class="badge-dot" aria-hidden="true"></span>
          Coming soon
        </span>
        <h1 class="card-heading">Employee lifecycle,<br />finally on autopilot</h1>
        <p class="card-body">
          From day-one access provisioning to seamless offboarding — StaffComplete orchestrates
          every step across your HR and IT systems so nothing falls through the cracks.
        </p>
      </div>
    </main>

    <footer class="footer">
      <p class="footer-text">StaffComplete &nbsp;·&nbsp; 2026</p>
    </footer>
  </body>
</html>
