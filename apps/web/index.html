<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StaffComplete</title>
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <meta name="theme-color" content="#041F1C" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      }

      /* ── Thread icon animation ── */
      @keyframes threadDraw {
        0% {
          stroke-dashoffset: 122;
        }
        62% {
          stroke-dashoffset: 0;
        }
        84% {
          stroke-dashoffset: 0;
        }
        97% {
          stroke-dashoffset: 122;
        }
        100% {
          stroke-dashoffset: 122;
        }
      }
      @keyframes nodeStart {
        0%,
        3% {
          opacity: 0;
          transform: scale(0.1);
        }
        13%,
        82% {
          opacity: 1;
          transform: scale(1);
        }
        97%,
        100% {
          opacity: 0;
          transform: scale(0.1);
        }
      }
      @keyframes nodeMid {
        0%,
        30% {
          opacity: 0;
          transform: scale(0.1);
        }
        41%,
        82% {
          opacity: 1;
          transform: scale(1);
        }
        97%,
        100% {
          opacity: 0;
          transform: scale(0.1);
        }
      }
      @keyframes nodeEnd {
        0%,
        59% {
          opacity: 0;
          transform: scale(0.1);
        }
        70%,
        82% {
          opacity: 1;
          transform: scale(1);
        }
        97%,
        100% {
          opacity: 0;
          transform: scale(0.1);
        }
      }

      /* ── Page entry ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Seconds tick ── */
      @keyframes tick {
        0% {
          opacity: 1;
        }
        15% {
          opacity: 0.6;
        }
        30% {
          opacity: 1;
        }
      }

      .fade-1 {
        animation: fadeUp 0.8s ease both 0.1s;
      }
      .fade-2 {
        animation: fadeUp 0.8s ease both 0.25s;
      }
      .fade-3 {
        animation: fadeUp 0.8s ease both 0.4s;
      }
      .fade-4 {
        animation: fadeUp 0.8s ease both 0.5s;
      }
      .fade-5 {
        animation: fadeUp 0.8s ease both 0.55s;
      }
      .fade-6 {
        animation: fadeUp 0.8s ease both 0.6s;
      }
      .fade-7 {
        animation: fadeUp 0.8s ease both 0.75s;
      }
      .fade-8 {
        animation: fadeUp 0.8s ease both 0.85s;
      }
    </style>
  </head>
  <body>
    <div
      style="
        min-height: 100vh;
        background: radial-gradient(ellipse 90% 80% at 50% 38%, #082e28 0%, #041f1c 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        padding: 48px 24px;
      "
    >
      <!-- Dot grid -->
      <div
        style="
          position: absolute;
          inset: 0;
          background-image: radial-gradient(rgba(13, 148, 136, 0.08) 1px, transparent 1px);
          background-size: 44px 44px;
          pointer-events: none;
          z-index: 0;
        "
      ></div>

      <!-- Watermark Thread icon -->
      <svg
        style="
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -55%);
          width: 860px;
          height: 492px;
          opacity: 0.038;
          pointer-events: none;
          flex-shrink: 0;
        "
        viewBox="0 0 140 80"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path
          d="M 18,62 C 44,62 44,40 70,40 C 96,40 96,18 122,18"
          fill="none"
          stroke="#2DD4BF"
          stroke-width="4.5"
          stroke-linecap="round"
        />
        <circle cx="18" cy="62" r="11" fill="none" stroke="#2DD4BF" stroke-width="4" />
        <circle cx="70" cy="40" r="13.5" fill="#2DD4BF" />
        <circle cx="70" cy="40" r="5.5" fill="#041F1C" />
        <circle cx="122" cy="18" r="11" fill="none" stroke="#2DD4BF" stroke-width="4" />
      </svg>

      <!-- Main content -->
      <div
        style="
          position: relative;
          z-index: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          text-align: center;
          max-width: 560px;
          width: 100%;
        "
      >
        <!-- Badge -->
        <div
          class="fade-1"
          style="
            display: inline-block;
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #0d9488;
            padding: 6px 18px;
            border: 1px solid rgba(13, 148, 136, 0.3);
            border-radius: 100px;
            margin-bottom: 44px;
          "
        >
          Coming Soon
        </div>

        <!-- Animated Thread icon -->
        <div class="fade-2" style="position: relative; margin-bottom: 36px">
          <div
            style="
              position: absolute;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
              width: 300px;
              height: 300px;
              background: radial-gradient(circle, rgba(13, 148, 136, 0.14) 0%, transparent 65%);
              pointer-events: none;
            "
          ></div>
          <svg
            width="210"
            height="120"
            viewBox="0 0 140 80"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="StaffComplete thread mark"
          >
            <path
              d="M 18,62 C 44,62 44,40 70,40 C 96,40 96,18 122,18"
              fill="none"
              stroke="#0D9488"
              stroke-width="4.5"
              stroke-linecap="round"
              style="
                stroke-dasharray: 122;
                stroke-dashoffset: 122;
                animation: threadDraw 5s ease-in-out infinite;
              "
            />
            <circle
              cx="18"
              cy="62"
              r="11"
              fill="#041F1C"
              stroke="#0D9488"
              stroke-width="4.5"
              style="
                transform-box: fill-box;
                transform-origin: center;
                opacity: 0;
                animation: nodeStart 5s ease-in-out infinite;
              "
            />
            <circle
              cx="70"
              cy="40"
              r="13.5"
              fill="#0D9488"
              style="
                transform-box: fill-box;
                transform-origin: center;
                opacity: 0;
                animation: nodeMid 5s ease-in-out infinite;
              "
            />
            <circle
              cx="70"
              cy="40"
              r="5.5"
              fill="#041F1C"
              style="
                transform-box: fill-box;
                transform-origin: center;
                opacity: 0;
                animation: nodeMid 5s ease-in-out infinite;
              "
            />
            <circle
              cx="122"
              cy="18"
              r="11"
              fill="#041F1C"
              stroke="#0D9488"
              stroke-width="4.5"
              style="
                transform-box: fill-box;
                transform-origin: center;
                opacity: 0;
                animation: nodeEnd 5s ease-in-out infinite;
              "
            />
          </svg>
        </div>

        <!-- Wordmark -->
        <div
          class="fade-3"
          style="
            font-size: 54px;
            letter-spacing: -0.04em;
            line-height: 1;
            font-weight: 700;
            margin-bottom: 14px;
          "
          aria-label="StaffComplete"
        >
          <span style="color: rgba(255, 255, 255, 0.82); font-weight: 300">Staff</span
          ><span style="color: #2dd4bf">Complete</span>
        </div>

        <!-- Tagline -->
        <div
          class="fade-4"
          style="
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #0d9488;
            margin-bottom: 36px;
          "
        >
          Full lifecycle, automated
        </div>

        <!-- Divider -->
        <div
          class="fade-5"
          style="
            width: 44px;
            height: 1.5px;
            background: rgba(13, 148, 136, 0.3);
            margin-bottom: 28px;
          "
          aria-hidden="true"
        ></div>

        <!-- Description -->
        <p
          class="fade-6"
          style="
            font-size: 15px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.4);
            margin: 0 0 52px;
            font-weight: 400;
            max-width: 400px;
          "
        >
          Automate the complete employee lifecycle across all your company systems — from onboarding
          to offboarding and everything in between.
        </p>

        <!-- Countdown -->
        <div
          class="fade-7"
          style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 28px"
          aria-label="Countdown to launch"
        >
          <!-- Days -->
          <div style="display: flex; flex-direction: column; align-items: center; gap: 9px">
            <div
              style="
                width: 82px;
                height: 78px;
                background: #051c18;
                border: 1px solid rgba(13, 148, 136, 0.18);
                border-top: 2px solid #0d9488;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <span
                id="cd-days"
                style="
                  font-size: 36px;
                  font-weight: 700;
                  color: white;
                  letter-spacing: -0.05em;
                  font-variant-numeric: tabular-nums;
                  line-height: 1;
                "
                >--</span
              >
            </div>
            <div
              style="
                font-size: 8.5px;
                font-weight: 700;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: rgba(13, 148, 136, 0.6);
              "
            >
              Days
            </div>
          </div>

          <div
            style="
              font-size: 30px;
              font-weight: 300;
              color: rgba(13, 148, 136, 0.25);
              padding-top: 18px;
              line-height: 1;
              user-select: none;
            "
            aria-hidden="true"
          >
            :
          </div>

          <!-- Hours -->
          <div style="display: flex; flex-direction: column; align-items: center; gap: 9px">
            <div
              style="
                width: 82px;
                height: 78px;
                background: #051c18;
                border: 1px solid rgba(13, 148, 136, 0.18);
                border-top: 2px solid #0d9488;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <span
                id="cd-hours"
                style="
                  font-size: 36px;
                  font-weight: 700;
                  color: white;
                  letter-spacing: -0.05em;
                  font-variant-numeric: tabular-nums;
                  line-height: 1;
                "
                >--</span
              >
            </div>
            <div
              style="
                font-size: 8.5px;
                font-weight: 700;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: rgba(13, 148, 136, 0.6);
              "
            >
              Hours
            </div>
          </div>

          <div
            style="
              font-size: 30px;
              font-weight: 300;
              color: rgba(13, 148, 136, 0.25);
              padding-top: 18px;
              line-height: 1;
              user-select: none;
            "
            aria-hidden="true"
          >
            :
          </div>

          <!-- Mins -->
          <div style="display: flex; flex-direction: column; align-items: center; gap: 9px">
            <div
              style="
                width: 82px;
                height: 78px;
                background: #051c18;
                border: 1px solid rgba(13, 148, 136, 0.18);
                border-top: 2px solid #0d9488;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <span
                id="cd-mins"
                style="
                  font-size: 36px;
                  font-weight: 700;
                  color: white;
                  letter-spacing: -0.05em;
                  font-variant-numeric: tabular-nums;
                  line-height: 1;
                "
                >--</span
              >
            </div>
            <div
              style="
                font-size: 8.5px;
                font-weight: 700;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: rgba(13, 148, 136, 0.6);
              "
            >
              Mins
            </div>
          </div>

          <div
            style="
              font-size: 30px;
              font-weight: 300;
              color: rgba(13, 148, 136, 0.25);
              padding-top: 18px;
              line-height: 1;
              user-select: none;
            "
            aria-hidden="true"
          >
            :
          </div>

          <!-- Secs -->
          <div style="display: flex; flex-direction: column; align-items: center; gap: 9px">
            <div
              style="
                width: 82px;
                height: 78px;
                background: #051c18;
                border: 1px solid rgba(13, 148, 136, 0.18);
                border-top: 2px solid #0d9488;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <span
                id="cd-secs"
                style="
                  font-size: 36px;
                  font-weight: 700;
                  color: rgba(255, 255, 255, 0.7);
                  letter-spacing: -0.05em;
                  font-variant-numeric: tabular-nums;
                  line-height: 1;
                  animation: tick 1s linear infinite;
                "
                >--</span
              >
            </div>
            <div
              style="
                font-size: 8.5px;
                font-weight: 700;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: rgba(13, 148, 136, 0.6);
              "
            >
              Secs
            </div>
          </div>
        </div>

        <!-- Launch date -->
        <div
          class="fade-8"
          style="
            font-size: 12.5px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.22);
            letter-spacing: 0.03em;
          "
        >
          Launching
          <span style="color: rgba(255, 255, 255, 0.5); font-weight: 600">August 23, 2026</span>
        </div>
      </div>

      <!-- Footer -->
      <div
        style="
          position: absolute;
          bottom: 28px;
          left: 0;
          right: 0;
          text-align: center;
          pointer-events: none;
        "
      >
        <div
          style="
            font-size: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.13);
            letter-spacing: 0.06em;
          "
        >
          © 2026 StaffComplete - dev
        </div>
      </div>
    </div>

    <script>
      ;(function () {
        const TARGET = new Date('2026-08-23T00:00:00').getTime()
        const days = document.getElementById('cd-days')
        const hours = document.getElementById('cd-hours')
        const mins = document.getElementById('cd-mins')
        const secs = document.getElementById('cd-secs')

        function pad(n) {
          return String(n).padStart(2, '0')
        }

        function tick() {
          const diff = Math.max(0, TARGET - Date.now())
          days.textContent = pad(Math.floor(diff / 86400000))
          hours.textContent = pad(Math.floor((diff % 86400000) / 3600000))
          mins.textContent = pad(Math.floor((diff % 3600000) / 60000))
          secs.textContent = pad(Math.floor((diff % 60000) / 1000))
        }

        tick()
        setInterval(tick, 1000)
      })()
    </script>
  </body>
</html>
